name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      # Node >= 22 is required by the wasm engine's integration test.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install TypeScript
        run: npm install -g typescript

      - name: Install dependencies
        run: dart pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib bin test/*.dart

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Run tests (golden, diagnostics, integration on both engines)
        run: dart test
